<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070709">
<link rel="manifest" href="manifest.json">
<title>Fasten Companion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070709; --surface: #111114; --surface2: #1a1a1f; --surface3: #222228;
  --border: #2a2a32; --text: #e4e4ea; --text2: #8888a0; --text3: #55556a;
  --accent: #6ee7b7; --warn: #fbbf24; --danger: #f87171;
  --radius: 14px;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', 'SF Mono', monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--font); background:var(--bg); color:var(--text); }

.app { height:100%; display:flex; flex-direction:column; }
.scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px 100px; }

.tab-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(7,7,9,0.94); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); display:flex;
  padding:6px 8px calc(6px + var(--safe-bottom)); z-index:100;
}
.tab-btn {
  flex:1; border:none; background:none; color:var(--text3);
  font-family:var(--font); font-size:10px; font-weight:500;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 4px; cursor:pointer; border-radius:8px;
}
.tab-btn.active { color:var(--accent); }
.tab-icon { font-size:20px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; }
.label { font-size:10px; font-weight:600; letter-spacing:2.5px; color:var(--text3); text-transform:uppercase; margin-bottom:10px; }

.timer-display {
  font-family:var(--mono); font-size:42px; font-weight:500;
  letter-spacing:2px; text-align:center;
  background:linear-gradient(135deg, var(--text), var(--accent));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.timer-sub { font-size:12px; color:var(--text2); text-align:center; margin-top:4px; font-family:var(--mono); }
.progress-track { width:100%; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-top:14px; }
.progress-fill { height:100%; border-radius:3px; transition:width 2s linear; }

.day-dots { display:flex; gap:6px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
.day-dot {
  width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600; font-family:var(--mono);
  border:2px solid var(--border); color:var(--text3);
}
.day-dot.done { border-color:var(--accent); color:var(--accent); background:rgba(110,231,183,0.08); }
.day-dot.current { border-color:var(--accent); color:var(--bg); background:var(--accent); }

.motiv-box {
  background:linear-gradient(135deg, rgba(110,231,183,0.06), rgba(96,165,250,0.04));
  border:1px solid rgba(110,231,183,0.12); border-radius:var(--radius); padding:18px; margin-bottom:12px;
}
.mood-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.mood-btn {
  border:1px solid var(--border); background:var(--surface2); color:var(--text);
  font-family:var(--font); font-size:13px; padding:10px 6px; border-radius:10px; cursor:pointer; text-align:center;
}
.elec-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.elec-row:last-child { border-bottom:none; }
.list-item { padding:10px 0; font-size:13px; color:var(--text2); border-bottom:1px solid rgba(42,42,50,0.5); line-height:1.5; }
.list-item:last-child { border-bottom:none; }
.warn-item { padding:8px 0; font-size:12.5px; color:var(--warn); border-bottom:1px solid rgba(42,42,50,0.5); }
.warn-item:last-child { border-bottom:none; }

.toggle-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
.toggle-row:last-child { border-bottom:none; }
.toggle {
  width:48px; height:28px; border-radius:14px; background:var(--surface3);
  border:none; cursor:pointer; position:relative; transition:background 0.2s;
}
.toggle.on { background:var(--accent); }
.toggle::after {
  content:''; position:absolute; width:22px; height:22px; border-radius:50%;
  background:white; top:3px; left:3px; transition:transform 0.2s;
}
.toggle.on::after { transform:translateX(20px); }

input[type="date"], input[type="time"], input[type="number"], select {
  width:100%; padding:12px 14px; background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-family:var(--font); font-size:15px; outline:none;
}
input:focus, select:focus { border-color:var(--accent); }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-primary {
  width:100%; padding:14px; border:none; border-radius:12px; background:var(--accent);
  color:var(--bg); font-family:var(--font); font-size:15px; font-weight:600; cursor:pointer;
}
.btn-secondary { width:100%; padding:12px; border:1px solid var(--border); border-radius:12px; background:none; color:var(--text2); font-family:var(--font); font-size:13px; cursor:pointer; }
.btn-danger { width:100%; padding:12px; border:1px solid rgba(248,113,113,0.3); border-radius:12px; background:rgba(248,113,113,0.06); color:var(--danger); font-family:var(--font); font-size:13px; cursor:pointer; margin-top:8px; }

.setting-group { margin-bottom:20px; }
.setting-label { font-size:13px; font-weight:500; margin-bottom:8px; }
.setting-sub { font-size:11px; color:var(--text2); margin-top:4px; }
.disclaimer { text-align:center; font-size:10px; color:var(--text3); padding:16px 0; line-height:1.5; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="scroll" id="scroll"></div>
  <div class="tab-bar" id="tabbar"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────
const PHASES_7=[
  {day:1,name:"Glykogen-Abbau",emoji:"🔥",color:"#f59e0b",desc:"Dein Körper verbrennt die letzten Glykogenspeicher. Hunger ist jetzt am stärksten — das geht vorbei.",tip:"Viel trinken! 2-3L Wasser. Leichte Bewegung, Salz nicht vergessen."},
  {day:2,name:"Übergang zur Ketose",emoji:"⚡",color:"#f97316",desc:"Glykogen wird knapp, Umschalten auf Fett beginnt. Müdigkeit und Brain Fog sind normal.",tip:"Elektrolyte! Natrium, Kalium, Magnesium. Nicht überanstrengen."},
  {day:3,name:"Ketose aktiviert",emoji:"🧠",color:"#ef4444",desc:"Die härteste Hürde! Ketonproduktion startet. Hunger wird paradoxerweise WENIGER. Tag 3 = Wendepunkt.",tip:"Durchhalten! Warmes Salzwasser hilft. Danach wird es leichter."},
  {day:4,name:"Tiefe Ketose",emoji:"✨",color:"#a78bfa",desc:"Gehirn läuft auf Ketonen. Mentale Klarheit, überraschend viel Energie. Hunger meist weg.",tip:"Genieße die Klarheit. Spaziergänge, produktive Arbeit — alles möglich."},
  {day:5,name:"Autophagie-Peak",emoji:"♻️",color:"#22d3ee",desc:"Zelluläre Selbstreinigung auf Hochtouren. Beschädigte Zellteile werden recycelt.",tip:"Hydrated bleiben, Elektrolyte weiter. Über die Hälfte!"},
  {day:6,name:"Tiefenreinigung",emoji:"💎",color:"#60a5fa",desc:"Autophagie setzt sich fort. Entzündungswerte sinken, Immunsystem regeneriert.",tip:"Fast geschafft. Refeed planen — Knochenbrühe, leichte Suppen."},
  {day:7,name:"Finisher",emoji:"🏆",color:"#10b981",desc:"Letzter Tag! Du bist stärker als jeder Impuls.",tip:"LANGSAM brechen! Knochenbrühe zuerst, dann leichte Suppe."}
];

function genPhases(n){
  if(n<=7) return PHASES_7.slice(0,n).map((p,i)=>({...p,day:i+1}));
  const p=[...PHASES_7.slice(0,4)];
  for(let i=0;i<n-5;i++) p.push({day:5+i,name:"Autophagie-Zone",emoji:"♻️",color:"#22d3ee",desc:"Volle Autophagie. Zellerneuerung auf Hochtouren.",tip:"Elektrolyte, Hydration, leichte Bewegung."});
  p.push({day:n-1,name:"Vorbereitung",emoji:"💎",color:"#60a5fa",desc:"Morgen ist es soweit. Refeed vorbereiten.",tip:"Knochenbrühe besorgen."});
  p.push({day:n,name:"Finisher",emoji:"🏆",color:"#10b981",desc:n+" Tage! Unglaublich.",tip:"LANGSAM brechen!"});
  return p.map((x,i)=>({...x,day:i+1}));
}

const MOT={
  m:["Neuer Tag, neuer Sieg.","Einfach Wasser, einfach sein.","Jede Stunde = Heilung.","Du machst weiter. Stärke.","Nutze die Morgen-Klarheit.","Dein Körper hat Nachtschicht gemacht.","Stell dir den letzten Tag vor.","Wasser rein, Gifte raus.","Gestern überlebt, heute auch.","Deine Transformation läuft."],
  d:["Mittagshunger? Nur Gewohnheit. Wasser!","Alle essen — du bist diszipliniert.","Welle kommt, Welle geht. 20 Min.","Fettverbrennung läuft. Lass ihn.","Mittagstest bestanden.","Wasser mit Salz. Fertig.","Magen knurrt = Veränderung.","Mittags schwächeln andere. Du nicht.","Augen zu, atmen, Wasser. Weiter.","Jede Mahlzeit übersprungen = Sieg."],
  a:["Nachmittags-Tief? Salz hilft.","Halber Tag geschafft.","Dein Grund gilt noch.","Dein Future-Self dankt dir.","Spaziergang = beste Ablenkung.","Das Tief geht IMMER vorbei.","Du bist weiter als heute morgen.","Oft ist es nur Salzmangel.","Jede Minute näher am Ziel.","Pause ist auch Leistung."],
  e:["Abend = Tag geschafft.","Tag im Kasten. Maschine.","Früh schlafen = einfach.","NICHTS gegessen, funktionierst. Wow.","Morgen wachst du stärker auf.","Tag bezwungen.","Tee, Augen zu, atmen.","Schlaf = bestes Tool.","Letzte Stunden heute.","Durchgehalten. Respekt."],
  n:["Schlaf heilt.","Ruhig liegen = Erholung.","Jede Stunde näher.","Nachts arbeitet dein Körper.","Atmen, loslassen."]
};
function getMotiv(seed){const h=new Date().getHours();const p=h>=6&&h<11?MOT.m:h>=11&&h<14?MOT.d:h>=14&&h<18?MOT.a:h>=18&&h<22?MOT.e:MOT.n;return p[Math.abs(seed)%p.length];}

const ELECS=[{name:"Natrium (Salz)",a:"1-2 TL/Tag",h:"Im Wasser oder unter die Zunge",i:"🧂"},{name:"Kalium",a:"200-400mg",h:"NoSalt / Supplement",i:"⚡"},{name:"Magnesium",a:"200-400mg",h:"Citrat oder Glycinat",i:"💊"}];
const ALLOWED=["Wasser (still & sprudel)","Schwarzer Kaffee (ohne alles)","Ungesüßter Tee","Salz & Elektrolyte","Warmes Wasser mit Zitrone (sparsam)"];
const NOPE=["Kalorien jeder Art","Milch/Sahne im Kaffee","Süßstoffe","Knochenbrühe (erst beim Brechen)","Kalorienhaltige Supplements"];
const WARN=["Starker Schwindel der bleibt","Herzrasen / Rhythmusstörungen","Ohnmacht / Blackouts","Anhaltendes starkes Erbrechen","Starke Krämpfe trotz Elektrolyte"];
const RFEED=["Stunde 0: Klare Knochenbrühe, warm, langsam","Stunde 2-3: Wassermelone oder Gurke","Stunde 4-6: Leichte Gemüsesuppe","Tag 2: Gedünstetes Gemüse, Avocado","Tag 3: Langsam normale Kost, klein"];

// ─── STATE ───────────────────────────────────────────
let S={configured:false,startDate:'',startTime:'00:00',totalDays:7,notifyOn:false,notifyMin:60,mseed:0,checks:{},tab:'tracker'};
try{const x=localStorage.getItem('fc3');if(x)S={...S,...JSON.parse(x)};}catch(e){}
function save(){try{localStorage.setItem('fc3',JSON.stringify(S));}catch(e){}}

// ─── NOTIFICATIONS ───────────────────────────────────
let nTimer=null;
async function reqN(){if(!('Notification' in window))return false;if(Notification.permission==='granted')return true;return(await Notification.requestPermission())==='granted';}
function schedN(){
  clearInterval(nTimer);if(!S.notifyOn||!S.configured)return;
  nTimer=setInterval(()=>{
    const now=new Date(),s=new Date(S.startDate+'T'+S.startTime),e=new Date(s.getTime()+S.totalDays*864e5);
    if(now<s||now>=e)return;
    const m=getMotiv(Date.now());
    try{new Notification('💧 Fasten',{body:m,tag:'fm'});}catch(e){}
  },S.notifyMin*6e4);
}

// ─── CALC ────────────────────────────────────────────
function calc(){
  const now=new Date(),s=new Date(S.startDate+'T'+S.startTime),e=new Date(s.getTime()+S.totalDays*864e5);
  const el=Math.max(0,now-s),rm=Math.max(0,e-now),pct=Math.min(100,(el/(e-s))*100);
  const day=Math.min(S.totalDays,Math.max(1,Math.ceil(el/864e5)));
  return{now,s,e,el,rm,pct,day,on:now>=s,done:now>=e};
}
function fmt(ms){const h=Math.floor(ms/36e5),m=Math.floor((ms%36e5)/6e4),s=Math.floor((ms%6e4)/1e3);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
const $=id=>document.getElementById(id);

// ─── RENDER (only on tab/config change) ──────────────
function renderPage(){
  // Tabs
  const bar=$('tabbar');bar.innerHTML='';
  [['tracker','⏱','Timer'],['phases','🔬','Phasen'],['rules','📋','Regeln'],['refeed','🍽','Refeed'],['config','⚙️','Setup']].forEach(([id,ic,lb])=>{
    const b=document.createElement('button');b.className='tab-btn'+(S.tab===id?' active':'');
    b.innerHTML='<span class="tab-icon">'+ic+'</span>'+lb;
    b.addEventListener('click',()=>{S.tab=id;save();renderPage();});
    bar.appendChild(b);
  });

  const sc=$('scroll');sc.innerHTML='';sc.scrollTop=0;
  if(!S.configured){renderSetup(sc);return;}

  const t=calc();
  const sd=t.s.toLocaleDateString('de-DE',{day:'numeric',month:'short'});
  const ed=t.e.toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'});
  sc.insertAdjacentHTML('beforeend','<div style="text-align:center;padding:8px 0 20px"><div style="font-size:13px;font-weight:300;letter-spacing:6px;color:var(--text3);text-transform:uppercase">WASSERFASTEN</div><div style="font-size:20px;font-weight:700;margin-top:4px">'+sd+' – '+ed+'</div><div style="font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)">'+S.totalDays+' Tage · '+S.totalDays*24+' Stunden</div></div>');

  if(S.tab==='tracker') rTracker(sc,t);
  else if(S.tab==='phases') rPhases(sc,t);
  else if(S.tab==='rules') rRules(sc);
  else if(S.tab==='refeed') rRefeed(sc);
  else if(S.tab==='config') rConfig(sc,t);

  sc.insertAdjacentHTML('beforeend','<div class="disclaimer">Kein Ersatz für ärztliche Beratung · Bei Problemen sofort abbrechen</div>');
}

function rTracker(sc,t){
  const phases=genPhases(S.totalDays);
  const ph=phases[Math.min(t.day-1,phases.length-1)];

  if(!t.on){
    sc.insertAdjacentHTML('beforeend','<div class="card" style="text-align:center;padding:30px 20px"><div style="font-size:48px;margin-bottom:8px">🧘</div><div style="font-size:17px;font-weight:600">Startet am '+t.s.toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'})+'</div><div style="font-size:12px;color:var(--text2);margin-top:8px">Letzte Mahlzeit genießen. Dann nur Wasser.</div></div>');
    return;
  }
  if(t.done){
    sc.insertAdjacentHTML('beforeend','<div class="card" style="text-align:center;padding:30px 20px;background:linear-gradient(135deg,rgba(110,231,183,0.1),rgba(52,211,153,0.05));border-color:rgba(110,231,183,0.2)"><div style="font-size:52px;margin-bottom:10px">🏆</div><div style="font-size:20px;font-weight:700;color:var(--accent)">'+S.totalDays+' TAGE GESCHAFFT!</div><div style="font-size:13px;color:var(--text2);margin-top:6px">Jetzt langsam Refeed starten.</div></div>');
    return;
  }

  const eH=Math.floor(t.el/36e5),eM=Math.floor((t.el%36e5)/6e4);
  let dots='';
  if(S.totalDays<=14){dots='<div class="day-dots">';for(let i=1;i<=S.totalDays;i++){const c=i<t.day?'day-dot done':i===t.day?'day-dot current':'day-dot';dots+='<div class="'+c+'">'+(i<t.day?'✓':i)+'</div>';}dots+='</div>';}

  sc.insertAdjacentHTML('beforeend','<div class="card"><div class="timer-display" id="T">'+fmt(t.rm)+'</div><div class="timer-sub">verbleibend</div><div id="Ts" style="text-align:center;margin-top:12px;font-size:13px;color:var(--text2);font-family:var(--mono)">'+eH+'h '+eM+'m gefastet · Tag '+t.day+'/'+S.totalDays+'</div><div class="progress-track"><div class="progress-fill" id="Tp" style="width:'+t.pct+'%;background:linear-gradient(90deg,'+ph.color+','+ph.color+'aa)"></div></div>'+dots+'</div>');

  sc.insertAdjacentHTML('beforeend','<div class="card" style="border-left:3px solid '+ph.color+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:22px">'+ph.emoji+'</span><div style="font-size:14px;font-weight:600">Tag '+t.day+': '+ph.name+'</div></div><div style="font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:10px">'+ph.desc+'</div><div style="font-size:11.5px;color:'+ph.color+';background:'+ph.color+'12;padding:8px 12px;border-radius:8px">💡 '+ph.tip+'</div></div>');

  // Motivation
  const mv=document.createElement('div');mv.className='motiv-box';
  mv.innerHTML='<div class="label">MOTIVATION</div><div style="font-size:15px;line-height:1.65;font-style:italic;color:var(--text)">„'+getMotiv(S.mseed+t.day)+'"</div>';
  const rb=document.createElement('button');
  rb.textContent='🔄 Neue Motivation';
  rb.style.cssText='margin-top:12px;border:1px solid var(--border);background:none;color:var(--text2);font-family:var(--font);font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer';
  rb.addEventListener('click',()=>{S.mseed++;save();renderPage();});
  mv.appendChild(rb);sc.appendChild(mv);

  // Check-in
  const tk=t.now.getFullYear()+'-'+t.now.getMonth()+'-'+t.now.getDate();
  const cc=document.createElement('div');cc.className='card';
  cc.innerHTML='<div class="label">TAGES CHECK-IN</div>';
  if(S.checks[tk]){cc.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:var(--accent)">✅ '+S.checks[tk]+'</div>');}
  else{const g=document.createElement('div');g.className='mood-grid';['💪 Stark','😤 Kämpfe','🧘 Ruhig','😵 Schwer','🔥 Motiviert','😴 Müde'].forEach(m=>{const b=document.createElement('button');b.className='mood-btn';b.textContent=m;b.addEventListener('click',()=>{S.checks[tk]=m;save();renderPage();});g.appendChild(b);});cc.appendChild(g);}
  sc.appendChild(cc);

  // Elektrolyte
  let eh='<div class="label">ELEKTROLYTE</div>';
  ELECS.forEach(e=>{eh+='<div class="elec-row"><span style="font-size:22px">'+e.i+'</span><div><div style="font-size:13px;font-weight:500">'+e.name+'</div><div style="font-size:11px;color:var(--text2)">'+e.a+' — '+e.h+'</div></div></div>';});
  sc.insertAdjacentHTML('beforeend','<div class="card">'+eh+'</div>');
}

function rPhases(sc,t){
  const phases=genPhases(S.totalDays);
  let h='<div class="card"><div class="label">PHASEN · '+S.totalDays+' TAGE</div>';
  phases.forEach((p,i)=>{
    const now=t.on&&!t.done&&t.day===i+1,dn=t.on&&t.day>i+1;
    const tag=now?'<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+p.color+';color:#000;margin-left:6px">JETZT</span>':(dn?'<span style="color:var(--accent);margin-left:6px">✓</span>':'');
    h+='<div style="padding:14px 0;border-bottom:1px solid var(--border);opacity:'+(dn?0.5:1)+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:22px">'+p.emoji+'</span><span style="font-size:14px;font-weight:600">Tag '+p.day+': '+p.name+'</span>'+tag+'</div><div style="font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:6px">'+p.desc+'</div><div style="font-size:11.5px;color:'+p.color+';opacity:0.8">💡 '+p.tip+'</div></div>';
  });
  sc.insertAdjacentHTML('beforeend',h+'</div>');
}

function rRules(sc){
  let h1='<div class="label" style="color:var(--accent)">✅ ERLAUBT</div>';ALLOWED.forEach(a=>{h1+='<div class="list-item">'+a+'</div>';});
  let h2='<div class="label" style="color:var(--danger)">❌ NICHT ERLAUBT</div>';NOPE.forEach(a=>{h2+='<div class="list-item">'+a+'</div>';});
  let h3='<div class="label" style="color:var(--warn)">⚠️ SOFORT ABBRECHEN BEI</div>';WARN.forEach(w=>{h3+='<div class="warn-item">⚠ '+w+'</div>';});
  sc.insertAdjacentHTML('beforeend','<div class="card">'+h1+'</div><div class="card">'+h2+'</div><div class="card">'+h3+'</div>');
}

function rRefeed(sc){
  let h='<div class="label">FASTENBRECHEN</div><div style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6">Nach langem Fasten: LANGSAM brechen!</div>';
  RFEED.forEach((r,i)=>{h+='<div style="display:flex;gap:10px;padding:10px 0;border-bottom:'+(i<RFEED.length-1?'1px solid var(--border)':'none')+'"><div style="width:24px;height:24px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0">'+(i+1)+'</div><div style="font-size:12.5px;color:var(--text2);line-height:1.5">'+r+'</div></div>';});
  sc.insertAdjacentHTML('beforeend','<div class="card">'+h+'</div><div class="card" style="border-left:3px solid var(--danger)"><div style="font-size:13px;font-weight:600;color:var(--danger);margin-bottom:6px">⛔ NICHT als erstes</div><div style="font-size:12px;color:var(--text2);line-height:1.6">Fleisch, Milch, Nüsse, rohes Gemüse, Brot, Zucker, Alkohol, große Portionen.</div></div>');
}

function rConfig(sc,t){
  const c=document.createElement('div');c.className='card';c.innerHTML='<div class="label">BENACHRICHTIGUNGEN</div>';
  const row=document.createElement('div');row.className='toggle-row';
  row.innerHTML='<div><div style="font-size:13px;font-weight:500">Push-Motivationen</div><div style="font-size:11px;color:var(--text2)">Alle '+S.notifyMin+' Min.</div></div>';
  const tog=document.createElement('button');tog.className='toggle'+(S.notifyOn?' on':'');
  tog.addEventListener('click',async()=>{if(!S.notifyOn){if(await reqN()){S.notifyOn=true;save();schedN();renderPage();}}else{S.notifyOn=false;save();clearInterval(nTimer);renderPage();}});
  row.appendChild(tog);c.appendChild(row);
  if(S.notifyOn){
    const sg=document.createElement('div');sg.className='setting-group';sg.style.marginTop='12px';
    sg.innerHTML='<div class="setting-label">Intervall (Minuten)</div><input type="number" id="cfgI" value="'+S.notifyMin+'" min="5" max="240">';
    const sb=document.createElement('button');sb.className='btn-secondary';sb.style.marginTop='8px';sb.textContent='Speichern';
    sb.addEventListener('click',()=>{S.notifyMin=Math.max(5,Math.min(240,parseInt($('cfgI').value)||60));save();schedN();renderPage();});
    sg.appendChild(sb);c.appendChild(sg);
  }
  sc.appendChild(c);

  if(t.on){const eH=Math.floor(t.el/36e5),eM=Math.floor((t.el%36e5)/6e4);
    sc.insertAdjacentHTML('beforeend','<div class="card"><div class="label">STATISTIK</div><div class="list-item">📊 Check-ins: '+Object.keys(S.checks).length+'/'+S.totalDays+'</div><div class="list-item">⏱ Gefastet: '+eH+'h '+eM+'m</div><div class="list-item">📅 Tag: '+t.day+'/'+S.totalDays+'</div><div class="list-item">💧 Empfohlen: 2-3L Wasser/Tag</div></div>');}

  const rc=document.createElement('div');rc.className='card';rc.innerHTML='<div class="label">RESET</div>';
  const b1=document.createElement('button');b1.className='btn-secondary';b1.textContent='🔄 Neues Fasten';
  b1.addEventListener('click',()=>{S.configured=false;S.checks={};save();renderPage();});
  rc.appendChild(b1);
  const b2=document.createElement('button');b2.className='btn-danger';b2.textContent='🗑 Alles löschen';
  b2.addEventListener('click',()=>{if(confirm('Löschen?')){localStorage.removeItem('fc3');location.reload();}});
  rc.appendChild(b2);sc.appendChild(rc);
}

function renderSetup(sc){
  const tm=new Date(Date.now()+864e5).toISOString().split('T')[0];
  const td=new Date().toISOString().split('T')[0];
  sc.insertAdjacentHTML('beforeend','<div style="text-align:center;padding:40px 0 30px"><div style="font-size:56px;margin-bottom:12px">💧</div><div style="font-size:22px;font-weight:700">Fasten Companion</div><div style="font-size:13px;color:var(--text2)">Konfiguriere dein Wasserfasten</div></div><div class="card"><div class="setting-group"><div class="setting-label">Startdatum</div><input type="date" id="iD" value="'+(S.startDate||tm)+'" min="'+td+'"></div><div class="setting-group"><div class="setting-label">Startzeit</div><input type="time" id="iT" value="'+(S.startTime||'00:00')+'"></div><div class="setting-group"><div class="setting-label">Dauer (Tage)</div><div class="row-2"><input type="number" id="iN" value="'+(S.totalDays||7)+'" min="1" max="30"><select id="iP"><option value="">Preset...</option><option value="1">1 Tag</option><option value="3">3 Tage</option><option value="5">5 Tage</option><option value="7">7 Tage</option><option value="10">10 Tage</option><option value="14">14 Tage</option><option value="21">21 Tage</option></select></div><div class="setting-sub">1-30 Tage. Mehr als 7 nur mit Erfahrung!</div></div></div>');

  // Preset select handler
  setTimeout(()=>{const ps=$('iP');if(ps)ps.onchange=()=>{if(ps.value)$('iN').value=ps.value;};},0);

  const nc=document.createElement('div');nc.className='card';nc.innerHTML='<div class="label">BENACHRICHTIGUNGEN</div>';
  const row=document.createElement('div');row.className='toggle-row';
  row.innerHTML='<div><div class="setting-label" style="margin:0">Motivations-Pushes</div><div class="setting-sub" style="margin:0">Regelmäßige Erinnerungen</div></div>';
  const tog=document.createElement('button');tog.className='toggle'+(S.notifyOn?' on':'');
  tog.addEventListener('click',async()=>{if(!S.notifyOn){if(await reqN()){S.notifyOn=true;save();renderPage();}}else{S.notifyOn=false;save();renderPage();}});
  row.appendChild(tog);nc.appendChild(row);
  if(S.notifyOn)nc.insertAdjacentHTML('beforeend','<div class="setting-group" style="margin-top:14px"><div class="setting-label">Intervall (Min.)</div><input type="number" id="iI" value="'+S.notifyMin+'" min="5" max="240"><div class="setting-sub">5-240 Min.</div></div>');
  sc.appendChild(nc);

  const btn=document.createElement('button');btn.className='btn-primary';btn.textContent='💧 Fasten starten';btn.style.marginTop='10px';
  btn.addEventListener('click',()=>{
    S.startDate=$('iD').value;S.startTime=$('iT').value||'00:00';
    S.totalDays=Math.max(1,Math.min(30,parseInt($('iN').value)||7));
    if(S.notifyOn){const v=$('iI');if(v)S.notifyMin=Math.max(5,Math.min(240,parseInt(v.value)||60));}
    S.configured=true;save();schedN();renderPage();
  });
  sc.appendChild(btn);
  sc.insertAdjacentHTML('beforeend','<div class="disclaimer">Kein Ersatz für ärztliche Beratung.</div>');
}

// ─── LIGHTWEIGHT TICK (only text updates, NO DOM rebuild) ─
function tick(){
  if(S.tab!=='tracker'||!S.configured)return;
  const t=calc();
  if(!t.on||t.done)return;

  const el=$('T');if(el)el.textContent=fmt(t.rm);
  const st=$('Ts');if(st){const eH=Math.floor(t.el/36e5),eM=Math.floor((t.el%36e5)/6e4);st.textContent=eH+'h '+eM+'m gefastet · Tag '+t.day+'/'+S.totalDays;}
  const pr=$('Tp');if(pr)pr.style.width=t.pct+'%';
}

// ─── INIT ────────────────────────────────────────────
// Unregister old service workers & clear caches to fix stale versions
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(r=>{r.forEach(x=>x.unregister());});
  if(window.caches)caches.keys().then(k=>{k.forEach(x=>caches.delete(x));});
}

renderPage();
setInterval(tick, 1000);
schedN();
</script>
</body>
</html>
